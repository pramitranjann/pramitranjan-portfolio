<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedIn Banner — Pramit Ranjan</title>
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --panel: #0f0f0f;
        --ink: #f5f2ed;
        --muted: #999999;
        --accent: #ff3120;
        --line: #1f1f1f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 1584px;
        height: 396px;
        background: var(--bg);
        color: var(--ink);
        font-family: "Clash Display", serif;
      }

      .banner {
        position: relative;
        width: 1584px;
        height: 396px;
        background: radial-gradient(1200px 360px at 75% 40%, rgba(255, 49, 32, 0.08), transparent 60%),
          radial-gradient(800px 280px at 20% 80%, rgba(245, 242, 237, 0.06), transparent 60%),
          var(--bg);
        overflow: hidden;
      }

      .grid {
        position: absolute;
        inset: 0;
        border: 1px solid var(--line);
      }

      .grid::before,
      .grid::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
      }

      .grid::before {
        top: 42%;
      }

      .grid::after {
        top: 72%;
      }

      .grid .vline {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 1px;
        background: rgba(255, 255, 255, 0.06);
        left: 58%;
      }

      .content {
        position: relative;
        height: 100%;
        display: grid;
        grid-template-columns: 1fr;
        padding: 48px 64px;
      }

      .meta {
        font-family: "DM Mono", monospace;
        letter-spacing: 0.28em;
        font-size: 12px;
        color: var(--accent);
        text-transform: uppercase;
      }

      .name {
        font-size: 64px;
        line-height: 0.95;
        margin: 18px 0 20px;
        font-weight: 500;
      }

      .tagline {
        font-family: "DM Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.12em;
        color: var(--muted);
        line-height: 1.7;
        max-width: 500px;
        text-align: right;
        margin-left: auto;
      }

      .subline {
        margin-top: 12px;
        font-family: "DM Mono", monospace;
        letter-spacing: 0.2em;
        font-size: 26px;
        color: var(--accent);
        text-transform: uppercase;
      }

      .footer {
        position: absolute;
        left: 64px;
        right: 64px;
        bottom: 48px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        font-family: "DM Mono", monospace;
        font-size: 20px;
        letter-spacing: 0.24em;
        color: var(--accent);
        text-transform: uppercase;
      }

      .safe-right {
        margin-left: 700px;
        text-align: right;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        position: relative;
        height: calc(100% - 96px);
      }

      .mid {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        margin-top: 27px;
      }

      .meta .meta-white {
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <div class="grid">
        <div class="vline"></div>
      </div>

      <div class="content">
        <div class="safe-right">
          <div class="mid">
            <div class="name">Pramit Ranjan</div>
            <div class="subline">UX design student at SCAD</div>
          </div>
        </div>
      </div>

      <div class="footer">
        <span>pramitranjan.com</span>
      </div>
    </div>
  </body>
</html>
