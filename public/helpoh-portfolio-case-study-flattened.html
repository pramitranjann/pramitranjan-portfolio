<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelpOH Portfolio Case Study Flattened</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    background: #050505;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .page {
    width: 420mm;
    height: 297mm;
    overflow: hidden;
    page-break-after: always;
    break-after: page;
    background: #0d0d0d;
  }

  .page:last-child {
    page-break-after: auto;
    break-after: auto;
  }

  .page img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: fill;
  }

  @page {
    size: A3 landscape;
    margin: 0;
  }
</style>
</head>
<body>
  <section class="page"><img src="./_flattened/helpoh/page-1.jpg" alt="HelpOH flattened page 1"></section>
  <section class="page"><img src="./_flattened/helpoh/page-2.jpg" alt="HelpOH flattened page 2"></section>
  <section class="page"><img src="./_flattened/helpoh/page-3.jpg" alt="HelpOH flattened page 3"></section>
</body>
</html>
